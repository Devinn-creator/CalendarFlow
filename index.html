<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Time Planner</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="app">

  <header>
    <h1>Time Planner</h1>
    <div class="controls">
      <button id="monthViewBtn">Month View</button>
      <button id="weekViewBtn">Week View</button>
    </div>
  </header>

  <section class="input-section">
    <input type="text" id="goalInput" placeholder="Enter a goal..." />
    <input type="date" id="deadlineInput" />
    <button id="addGoalBtn">Add Goal</button>
  </section>

  <section class="calendar" id="calendar"></section>

  <section class="summary">
    <h2>Today</h2>
    <div id="todaySummary"></div>

    <h3>Affirmation</h3>
    <div id="affirmation"></div>

    <h3>Daily Wisdom</h3>
    <div id="wisdom"></div>
  </section>

</div>

<script src="script.js"></script>
</body>
</html>
