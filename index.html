<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FlowPlanner</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="app">

  <header>
    <h1>FlowPlanner</h1>
    <div class="toggle">
      <button id="dotsBtn">Dots</button>
      <button id="weekBtn">Week</button>
    </div>
  </header>

  <!-- INPUT -->
  <section class="input">
    <textarea id="goalInput" placeholder="Enter goals (one per line)"></textarea>
    <input type="date" id="deadline" />
    <button id="addBtn">Add Goals</button>
  </section>

  <!-- CALENDAR -->
  <section id="calendar"></section>

  <!-- COVER FLOW -->
  <section class="coverflow">
    <button id="prev">‹</button>
    <div id="flow"></div>
    <button id="next">›</button>
  </section>

  <!-- INSIGHTS -->
  <section class="insights">
    <div>
      <h3>Today</h3>
      <ul id="todayList"></ul>
    </div>

    <div>
      <h3>Affirmation</h3>
      <p id="affirmation"></p>
    </div>

    <div>
      <h3>Daily Wisdom</h3>
      <p id="wisdom"></p>
    </div>
  </section>

</div>

<script src="script.js"></script>
</body>
</html>
