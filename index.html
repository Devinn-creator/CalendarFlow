<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FlowPlanner</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="app">

  <header>
    <h1>FlowPlanner</h1>
  </header>

  <section class="input">
    <textarea id="goalInput" placeholder="Enter goals (one per line)"></textarea>
    <input type="date" id="deadline" />
    <button id="addBtn">Add</button>
  </section>

  <!-- DOT CALENDAR -->
  <section id="calendar" class="dots"></section>

  <!-- COVER FLOW (SINGLE CARD) -->
  <section class="coverflow">
    <button id="prev">‹</button>
    <div id="card"></div>
    <button id="next">›</button>
  </section>

</div>

<script src="script.js"></script>
</body>
</html>
